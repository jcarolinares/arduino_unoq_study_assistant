services:
  ei-video-obj-detection-runner:
    user: 1000:1000
    volumes:
    - type: bind
      source: /dev
      target: /dev
    device_cgroup_rules:
    - c 226:* rmw
    - c 250:* rmw
    - c 504:* rmw
    - c 81:* rmw
    - c 116:* rmw
    group_add:
    - 44
    - 29
    - 991
    - 20
    - 1001
    labels:
      cc.arduino.app: "true"
      cc.arduino.app.path: /home/arduino/ArduinoApps/study-assistant
    environment:
      APP_HOME: /home/arduino/ArduinoApps/study-assistant
      BIND_ADDRESS: 0.0.0.0
      CUSTOM_MODEL_PATH: /home/arduino/.arduino-bricks/ei-models
      HOST_IP: 192.168.1.27
      VIDEO_DEVICE: /dev/video2
